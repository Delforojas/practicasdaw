<div class="min-h-screen flex items-center justify-center bg-[#e8dbc4] p-8">
  <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-6">
    <!-- Título -->
    <h2 class="text-2xl font-bold text-green-800 mb-6 text-center">
      Restablecer contraseña
    </h2>

    <!-- Formulario -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <!-- Token -->
      <input type="text" formControlName="token" placeholder="Introduce el token recibido"
        class="w-full p-3 rounded bg-gray-200 focus:outline-none border"
        [ngClass]="{ 'border-red-500': token?.invalid && token?.touched }" />

      <div *ngIf="token?.invalid && token?.touched" class="text-red-500 text-xs mt-1">
        <span *ngIf="token?.errors?.['required']">El token es obligatorio.</span>
      </div>

      <!-- Nueva contraseña -->
      <input type="password" formControlName="password" placeholder="Nueva contraseña"
        class="w-full p-3 rounded bg-gray-200 focus:outline-none border"
        [ngClass]="{ 'border-red-500': password?.invalid && password?.touched }" />

      <div *ngIf="password?.invalid && password?.touched" class="text-red-500 text-xs mt-1">
        <span *ngIf="password?.errors?.['required']">La contraseña es obligatoria.</span>
        <span *ngIf="password?.errors?.['minlength']">Debe tener al menos 8 caracteres.</span>
      </div>

      <!-- Botón -->
      <button type="submit"
        class="w-full bg-green-800 text-white font-semibold py-3 rounded shadow-md hover:bg-green-700 transition">
        Restablecer contraseña
      </button>
    </form>

    <!-- Volver al login -->
    <p class="mt-6 text-center text-sm text-gray-700">
      ¿Ya recuerdas tu contraseña?
      <a routerLink="/login" class="text-green-800 font-semibold hover:underline">Inicia sesión</a>
    </p>
  </div>
</div>
