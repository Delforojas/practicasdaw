<app-navbar></app-navbar>

<div class="min-h-screen grid grid-cols-1 md:grid-cols-2">
  <!-- Columna izquierda con imagen -->
  <div class="hidden md:block bg-cover bg-center"

    style="background-image: url('login-register-assets/login-register.webp');">
  </div>

  <!-- Columna derecha con login -->
  <div class="bg-[#e8dbc4] flex items-center justify-center p-8">
    <div class="w-full max-w-md">
      <!-- Título -->
      <h2 class="text-3xl font-bold text-green-800 mb-8 text-center">Log In</h2>

      <!-- Formulario -->

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <!-- Email -->
        <input type="email" placeholder="Email" formControlName="email"
               class="w-full p-3 rounded bg-gray-200 focus:outline-none" />

        <!-- Password -->
        <input type="password" placeholder="Password" formControlName="password" required
               class="w-full p-3 rounded bg-green-50 border border-green-800 focus:outline-none" />

        <div *ngIf="password?.touched && password?.invalid" class="text-red-500 text-xs mt-1">
            <span *ngIf="password?.errors?.['required']">La contraseña es requerida.</span>
            <span *ngIf="password?.errors?.['minlength']">Debe tener al menos 8 caracteres.</span>
            <span *ngIf="password?.errors?.['pattern']">Debe incluir mayúscula, minúscula, número y símbolo.</span>
        </div>

        <!-- Olvidé contraseña -->
        <div class="text-right">
          <a href="/forgot-password" class="text-sm text-blue-800 hover:underline">Olvidé mi contraseña</a>
        </div>

        <!-- Botón principal -->

        <button type="submit" 
                class="w-full bg-green-800 text-white font-semibold py-3 rounded shadow-md hover:bg-green-700 transition">
          Iniciar Sesión
        </button>
      </form>


         <p class="mt-6 text-center text-sm text-gray-700">
        ¿No tienes cuenta? 
        <a href="/register" class="text-green-800 font-semibold hover:underline">Regístrate</a>
      </p>

      <!-- Separador -->
      <div class="my-6 flex items-center">
        <div class="flex-grow h-px bg-gray-300"></div>
        <span class="px-4 text-sm text-gray-500">o</span>
        <div class="flex-grow h-px bg-gray-300"></div>
      </div>

      <!-- Login con redes -->

      <div class="flex flex-col space-y-3">
        <!-- Google -->
        <button class="flex items-center justify-center gap-2 border rounded py-2 hover:bg-gray-100 transition">
          <img src="login-register-assets/google.webp" class="w-5 h-5" alt="Google logo">
          <span>Accede con Google</span>
        </button>

        <!-- Apple -->
        <button class="flex items-center justify-center gap-2 border rounded py-2 hover:bg-gray-100 transition">
          <img src="login-register-assets/apple.webp" class="w-5 h-5" alt="Apple logo">
          <span>Accede con Apple</span>
        </button>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
