<section class="bg-[#F3E2C6] py-12">
  <h2 class="text-center text-3xl font-bold text-[#2F3E1F] mb-4">
    Eventos y talleres
  </h2>

  <div class="flex justify-center mb-8 w-full max-w-6xl mx-auto">
    <div class="flex bg-green-900 rounded-md overflow-hidden w-full justify-center">
      <button class="px-6 py-2 text-white hover:bg-green-700">Fisioterapia</button>
      <button class="px-6 py-2 text-white hover:bg-green-700">Clases</button>
      <button class="px-6 py-2 text-white hover:bg-green-700">Salas</button>
      <button class="px-6 py-2 bg-green-800 text-gray-100 font-semibold">Eventos y talleres</button>
    </div>
  </div>
  <div class="max-w-6xl mx-auto bg-[#EAEAEA] rounded-xl shadow-lg p-6">
    <div class="grid md:grid-cols-2 gap-8">
      <!-- Lado izquierdo: solo imagen -->
      <div class="flex items-stretch w-full h-full">
        <img src="events-forms/events-form.webp" alt="Eventos y talleres" class="object-cover rounded-xl w-full h-full" />
      </div>

      <!-- Formulario -->
      <form [formGroup]="formulario" (ngSubmit)="onSubmit()" class="space-y-4">

      <div>
        <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre y apellidos</label>
        <input
          id="nombre"
          type="text"
          formControlName="nombre"
          placeholder="Nombre y apellidos"
          class="w-full px-4 py-2 rounded-md border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none"
        />
      </div>

      <div>
        <label for="telefono" class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
        <input
          id="telefono"
          type="tel"
          formControlName="telefono"
          placeholder="Teléfono"
          class="w-full px-4 py-2 rounded-md border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none"
        />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Email"
          class="w-full px-4 py-2 rounded-md border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none"
        />
      </div>

      <div>
        <label for="evento" class="block text-sm font-medium text-gray-700 mb-1">Evento o taller que quieres reservar</label>
        <input
          id="evento"
          type="text"
          formControlName="evento"
          placeholder="Evento o taller que quieres reservar"
          class="w-full px-4 py-2 rounded-md border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none"
        />
      </div>

      <div>
        <label for="fecha" class="block text-sm font-medium text-gray-700 mb-1">Fecha</label>
        <input
          id="fecha"
          type="date"
          formControlName="fecha"
          class="w-full px-4 py-2 rounded-md border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none"
        />
      </div>

      <div>
        <label for="mensaje" class="block text-sm font-medium text-gray-700 mb-1">Mensaje</label>
        <textarea
          id="mensaje"
          formControlName="mensaje"
          rows="4"
          placeholder="Escribe aquí tu solicitud"
          class="w-full px-4 py-2 rounded-md border border-gray-300 focus:ring-2 focus:ring-green-500 focus:outline-none"
        ></textarea>
      </div>

      <label class="flex items-start space-x-2 text-sm text-gray-600">
        <input
          type="checkbox"
          formControlName="acepta"
          class="mt-1 rounded border-gray-300 text-green-600 focus:ring-green-500"
        />
        <span>
          He leído y acepto la información básica sobre protección de datos, la
          política de privacidad y acepto el tratamiento de mis datos para el
          trámite de la solicitud realizada
        </span>
      </label>

      <button
        type="submit"
        [disabled]="formulario.invalid"
        class="bg-[#2F3E1F] text-white px-6 py-2 rounded-md hover:bg-[#3C5A2A] transition disabled:opacity-50"
      >
        Enviar
      </button>
      </form>
    </div>
  </div>
</section>
