<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
 <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md font-inriaSans">
   <h2 class="text-xl font-bold mb-4">{{ title }}</h2>
   <p class="mb-6">{{ message }}</p>
   <div class="flex justify-end gap-4">
     <button (click)="cancel.emit()"
       class="px-4 py-2 bg-gray-300 hover:bg-gray-400 rounded transition">Cancelar</button>
     <button (click)="confirm.emit()"
       class="px-4 py-2 bg-red-600 text-white hover:bg-red-700 rounded transition">Confirmar</button>
   </div>
 </div>
</div>
